<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAS 新着情報ウィジェット</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f4f6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .news-widget {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 680px;
      overflow: hidden;
    }
    .news-widget__header {
      background: #2d6a2d;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .news-widget__header h2 { font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; }
    .news-widget__status {
      padding: 2rem 1.5rem;
      text-align: center;
      color: #888;
      font-size: 0.9rem;
    }
    .news-widget__status.error { color: #c0392b; }
    .news-list { list-style: none; }
    .news-list__item { border-bottom: 1px solid #eee; }
    .news-list__item:last-child { border-bottom: none; }
    .news-list__item:hover { background: #f8faf5; }
    .news-list__link {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.85rem 1.5rem;
      text-decoration: none;
      color: inherit;
    }
    .news-list__thumb {
      width: 72px; height: 54px;
      object-fit: cover; border-radius: 4px; flex-shrink: 0;
    }
    .news-list__thumb--placeholder {
      width: 72px; height: 54px; border-radius: 4px; flex-shrink: 0;
      background: #e8ede8;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .news-list__body { flex: 1; min-width: 0; }
    .news-list__meta {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.3rem; flex-wrap: wrap;
    }
    .news-list__date { font-size: 0.75rem; color: #888; }
    .news-list__badge {
      font-size: 0.65rem; background: #e8f0e8; color: #2d6a2d;
      border-radius: 3px; padding: 1px 6px; font-weight: 500;
    }
    .news-list__badge--new { background: #2d6a2d; color: #fff; }
    .news-list__title {
      font-size: 0.88rem; line-height: 1.5; color: #222;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-widget__footer {
      background: #f8faf5; border-top: 1px solid #eee;
      padding: 0.75rem 1.5rem; text-align: right;
    }
    .news-widget__footer a { font-size: 0.8rem; color: #2d6a2d; text-decoration: none; font-weight: 500; }
    .news-widget__footer a:hover { text-decoration: underline; }
    .news-widget__updated { font-size: 0.72rem; color: #bbb; margin-top: 0.1rem; }
  </style>
</head>
<body>

<div class="news-widget">
  <div class="news-widget__header">
    <span>🌿</span>
    <h2>ＪＡ滋賀中央会　新着情報</h2>
  </div>
  <div class="news-widget__status" id="status">読み込み中…</div>
  <ul class="news-list" id="list" style="display:none"></ul>
  <div class="news-widget__footer" style="display:none" id="footer">
    <a href="https://www.jas.or.jp/topics/" target="_blank" rel="noopener">一覧はこちら →</a>
    <div class="news-widget__updated" id="updated"></div>
  </div>
</div>

<script>
(function () {
  // ============================================================
  // ★ ここを自分のリポジトリの URL に変更してください
  //    形式: https://raw.githubusercontent.com/【ユーザー名】/【リポジトリ名】/main/news.json
  // ============================================================
  const NEWS_JSON_URL = 'https://raw.githubusercontent.com/ma2-hub/jas_test/main/news.json';
  const NEW_BADGE_DAYS = 7;
  // ============================================================

  const statusEl = document.getElementById('status');
  const listEl   = document.getElementById('list');
  const footerEl = document.getElementById('footer');
  const updatedEl = document.getElementById('updated');

  function formatDate(str) {
    const d = new Date(str);
    if (isNaN(d)) return str;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  function isNew(str) {
    return (Date.now() - new Date(str).getTime()) / 86400000 < NEW_BADGE_DAYS;
  }

  fetch(NEWS_JSON_URL)
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .then(data => {
      const items = data.items || [];
      if (!items.length) { statusEl.textContent = '新着情報はありません。'; return; }

      listEl.innerHTML = items.map(item => {
        const thumb = item.thumbnail
          ? `<img class="news-list__thumb" src="${item.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="news-list__thumb--placeholder">🌿</div>`;
        const cats = (item.categories || []).slice(0,2)
          .map(c => `<span class="news-list__badge">${c}</span>`).join('');
        return `
          <li class="news-list__item">
            <a class="news-list__link" href="${item.link}" target="_blank" rel="noopener">
              ${thumb}
              <div class="news-list__body">
                <div class="news-list__meta">
                  <span class="news-list__date">${formatDate(item.pubDate)}</span>
                  ${isNew(item.pubDate) ? '<span class="news-list__badge news-list__badge--new">NEW</span>' : ''}
                  ${cats}
                </div>
                <div class="news-list__title">${item.title}</div>
              </div>
            </a>
          </li>`;
      }).join('');

      listEl.style.display = '';
      statusEl.style.display = 'none';
      footerEl.style.display = '';

      // 最終更新時刻（news.json の updated フィールドを使用）
      if (data.updated) {
        updatedEl.textContent = `最終更新: ${new Date(data.updated).toLocaleString('ja-JP')}`;
      }
    })
    .catch(err => {
      statusEl.textContent = `⚠️ 取得失敗: ${err.message}`;
      statusEl.classList.add('error');
    });
})();
</script>

</body>
</html>
